name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main  # runs automatically on every push to main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Check out the code
      - name: Checkout
        uses: actions/checkout@v4

      # 2. Set Node version (reads from .nvmrc if present)
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      # 3. Install dependencies (uses package-lock.json for exact versions)
      - name: Install dependencies
        run: npm ci

      # 4. Build the React app
      - name: Build
        run: npm run build

      # 5. Deploy build/ folder to gh-pages branch
      - name: Deploy
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./build